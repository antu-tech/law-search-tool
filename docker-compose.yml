version: "3.8"

services:
  law-search:
    build: .
    container_name: law-search-tool
    ports:
      - "${LAW_SEARCH_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    environment:
      - SQLITE_PATH=/app/data/law_search.db
      - UPLOAD_DIR=/app/uploads
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - LEGAL_DB_URL=http://legal-db:8001
    restart: unless-stopped
    networks:
      - law-search-net
    depends_on:
      - legal-db

  legal-db:
    build: ./legal-db-bridge
    container_name: law-search-legal-db
    # ports:
    #   - "${LEGAL_DB_PORT:-8001}:8001"  # 僅除錯時開啟
    restart: unless-stopped
    networks:
      - law-search-net

networks:
  law-search-net:
    driver: bridge
